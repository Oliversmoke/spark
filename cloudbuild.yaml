# Google Cloud Build — builds image and deploys to Cloud Run
# Usage: gcloud builds submit --config cloudbuild.yaml
#
# Set substitutions when submitting, or in Cloud Build trigger:
#   _REGION, _SERVICE, _REPOSITORY

substitutions:
  _REGION: us-central1
  _SERVICE: comeback-ai
  _REPOSITORY: comeback-ai

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$COMMIT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:latest"
      - "--build-arg"
      - "NEXT_PUBLIC_VAPID_PUBLIC_KEY=${_NEXT_PUBLIC_VAPID_PUBLIC_KEY}"
      - "--build-arg"
      - "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}"
      - "--build-arg"
      - "NEXT_PUBLIC_PLAUSIBLE_DOMAIN=${_NEXT_PUBLIC_PLAUSIBLE_DOMAIN}"
      - "."

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}"

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$COMMIT_SHA"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - managed
      - "--allow-unauthenticated"
      - "--port"
      - "8080"
      - "--memory"
      - "512Mi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "10"
      - "--timeout"
      - "300"
      - "--env-vars-file"
      - "env.cloudrun.yaml"

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
